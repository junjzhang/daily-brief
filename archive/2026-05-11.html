<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Brief 每日简报 — 2026-05-11</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2129;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:0}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1a1e2e 100%);border-bottom:1px solid var(--border);padding:2.5rem 1.5rem 2rem;text-align:center;position:relative}
.header h1{font-size:1.6rem;font-weight:600;margin-bottom:.4rem}
.header .date{color:var(--muted);font-size:.95rem}
.header .back{position:absolute;left:1.5rem;top:1.5rem;color:var(--muted);font-size:.85rem}

.container{max-width:800px;margin:0 auto;padding:1.5rem}

.stats{text-align:center;padding:.6rem 1rem;margin-bottom:1.5rem;font-size:.9rem;font-weight:500;color:var(--accent);background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.15);border-radius:8px}
.stats-empty{color:var(--muted);background:var(--surface);border-color:var(--border)}

.section{margin-bottom:2.5rem}
.section-title{font-size:1.15rem;font-weight:600;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.count{background:var(--surface);color:var(--muted);font-size:.75rem;padding:2px 8px;border-radius:10px;margin-left:.5rem}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1rem;transition:border-color .2s}
.card:hover{border-color:#484f58}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.75rem;flex-wrap:wrap}
.card-title{font-size:1.05rem;font-weight:600;color:var(--text)}
.badge{font-size:.7rem;font-weight:500;padding:3px 10px;border-radius:12px;white-space:nowrap;flex-shrink:0}
.card-meta{font-size:.8rem;color:var(--muted);margin-bottom:.75rem}
.card-link{display:inline-block;margin-top:.75rem;font-size:.85rem;color:var(--accent)}

.insights{margin-top:.85rem;padding:.85rem 1rem;background:var(--surface2);border-radius:8px;border-left:3px solid var(--accent)}
.insight-row{display:flex;gap:.5rem;margin-bottom:.45rem;font-size:.88rem}
.insight-row:last-child{margin-bottom:0}
.insight-tag{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:2px}
.insight-text{color:#c9d1d9}

.compact{list-style:none;padding:0}
.compact li{padding:.6rem .85rem;margin-bottom:.35rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;justify-content:space-between;align-items:center;gap:1rem;font-size:.9rem}
.compact li:hover{border-color:#484f58}
.compact .c-title{flex:1}
.compact .c-meta{color:var(--muted);font-size:.8rem;white-space:nowrap;display:flex;align-items:center;gap:.6rem}

.footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border)}

@media(max-width:600px){
  .container{padding:1rem}
  .card{padding:1rem}
  .card-head{flex-direction:column;gap:.4rem}
  .compact li{flex-direction:column;align-items:flex-start;gap:.3rem}
}
</style>
</head>
<body>

<div class="header">
  <a href="../index.html" class="back">← 所有简报</a>
  <h1>Daily Brief 每日简报</h1>
  <div class="date">2026-05-11 · 自动生成</div>
</div>

<div class="container">
  <div class="stats stats-empty">今日无新内容</div>
  
</div>

<div class="footer">
  由 Claude Code Routine 自动生成 · 数据来源 
</div>

</body>
</html>
