<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Brief — Archive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;margin-bottom:.5rem}
p.sub{color:var(--muted);margin-bottom:2rem}
.list{width:100%;max-width:720px}
.list a{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;margin-bottom:.5rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);text-decoration:none;transition:border-color .2s;gap:.8rem}
.list a:hover{border-color:var(--accent)}
.list .new-badge{font-size:.72rem;padding:2px 8px;border-radius:10px;background:rgba(63,185,80,.15);color:var(--green);white-space:nowrap}
.list .no-new{font-size:.72rem;padding:2px 8px;border-radius:10px;background:var(--surface);color:var(--muted);border:1px solid var(--border);white-space:nowrap}
.list .meta{display:flex;align-items:center;gap:.5rem;color:var(--muted);font-size:.85rem}
.empty{color:var(--muted);text-align:center;margin-top:3rem}
</style>
</head>
<body>
<h1 id="title">Daily Brief</h1>
<p class="sub" id="desc">所有简报</p>
<div class="list" id="briefs"></div>
<p class="empty" id="empty" style="display:none">尚无简报。</p>
<script>
fetch('manifest.json')
  .then(r=>r.json())
  .then(data=>{
    const site=data.site||{};
    if(site.title){document.getElementById('title').textContent=site.title;document.title=site.title+' — Archive'}
    const briefs=data.briefs||[];
    if(!briefs.length){document.getElementById('empty').style.display='block';return}
    const list=document.getElementById('briefs');
    briefs.sort((a,b)=>b.date.localeCompare(a.date));
    briefs.forEach(b=>{
      const a=document.createElement('a');
      a.href=b.file;
      const badge=b.new_count>0
        ?'<span class="new-badge">'+b.new_count+' 篇新文章</span>'
        :'<span class="no-new">无新内容</span>';
      a.innerHTML='<span>'+b.date+'</span><span class="meta">'+badge+'<span>'+(b.sources||[]).join(' · ')+'</span></span>';
      list.appendChild(a);
    });
  })
  .catch(()=>{document.getElementById('empty').style.display='block'});
</script>
</body>
</html>
