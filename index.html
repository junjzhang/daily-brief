<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Daily Brief</title>
<style>body{background:#0d1117;color:#8b949e;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}a{color:#58a6ff}</style>
</head>
<body>
<p>Loading latest brief...</p>
<script>
fetch('archive/manifest.json')
  .then(r=>r.json())
  .then(data=>{
    const briefs=(data.briefs||[]).sort((a,b)=>b.date.localeCompare(a.date));
    if(briefs.length) window.location.replace('archive/'+briefs[0].file);
    else document.querySelector('p').innerHTML='尚无简报。<a href="archive/">查看归档</a>';
  })
  .catch(()=>{document.querySelector('p').innerHTML='加载失败。<a href="archive/">查看归档</a>'});
</script>
</body>
</html>
